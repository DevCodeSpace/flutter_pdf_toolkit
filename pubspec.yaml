name: flutter_pdf_toolkit
description: "Native PDF toolkit for Flutter (Android & iOS): view, search, sign, reorder, add/delete pages, insert images, merge, split, password-protect, thumbnails, zoom & dark mode."
version: 0.0.1
homepage: https://github.com/DevCodeSpace/flutter_pdf_toolkit
issue_tracker: https://github.com/DevCodeSpace/flutter_pdf_toolkit/issues
documentation: https://pub.dev/documentation/flutter_pdf_toolkit/latest/

environment:
  sdk: ^3.11.5
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

screenshots:
  - description: "A high-performance native PDF viewer for Flutter (Android & iOS) with support for bookmarks, search, password protection, page thumbnails, zoom, and dark mode."
    path: screenshots/screenshot1.png
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_pdf_toolkit
        pluginClass: FlutterPdfToolkitPlugin
      ios:
        pluginClass: FlutterPdfToolkitPlugin

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
